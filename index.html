<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude AI — Account Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --bg2: #16181c;
    --bg3: #1e2126;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --text2: #8b8e96;
    --text3: #555a63;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.12);
    --green: #34c77b;
    --green-dim: rgba(52,199,123,0.12);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.1);
    --red: #f05252;
    --red-dim: rgba(240,82,82,0.1);
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-left p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Buttons */
  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--bg3);
    color: var(--text2);
    padding: 7px 14px;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  button:hover { background: var(--bg2); color: var(--text); border-color: var(--border2); }
  button:active { transform: scale(0.97); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: #3a7de6; }
  button.danger { background: var(--red-dim); color: var(--red); border-color: rgba(240,82,82,0.25); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    animation: fadeUp 0.4s ease both;
  }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .stat-val {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
  }
  .stat-val.amber { color: var(--amber); }
  .stat-val.green { color: var(--green); }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead tr {
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }

  th {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 14px;
    text-align: left;
  }
  th:first-child { width: 44px; text-align: center; }
  th:nth-child(4) { width: 148px; }
  th:last-child   { width: 70px; text-align: center; }

  tbody tr {
    border-top: 1px solid var(--border);
    transition: background 0.12s;
    animation: fadeUp 0.35s ease both;
  }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr.used { background: rgba(79,142,247,0.06); }

  td {
    padding: 11px 14px;
    font-size: 13px;
    color: var(--text2);
    vertical-align: middle;
    word-break: break-word;
  }
  td:first-child { text-align: center; }
  td:last-child  { text-align: center; }

  .account-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .account-note {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }

  .email {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
  }

  .time-cell {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
  }
  .time-cell.today { color: var(--green); }

  /* Checkbox custom */
  .cb-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    width: 20px;
    height: 20px;
  }

  .cb-wrap input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border2);
    border-radius: 5px;
    background: transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .cb-wrap input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .cb-wrap input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1.5px;
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  /* Status badge */
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .badge.free   { background: var(--green-dim); color: var(--green); }
  .badge.used   { background: var(--accent-dim); color: var(--accent); }

  /* Icon btn */
  .icon-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 7px;
    padding: 5px;
    color: var(--text3);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    display: inline-flex;
    align-items: center;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text2); border-color: var(--border2); }
  .icon-btn svg { display: block; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.2s ease both;
  }
  .modal h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .modal p {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 1rem;
    font-family: 'DM Mono', monospace;
  }
  .modal input[type="text"],
  .modal textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { height: 80px; }
  .modal .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 12px;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* Footer note */
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    margin-top: 1.5rem;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    th:nth-child(4), td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Claude AI — Account Tracker</h1>
      <p id="current-date">Yuklanmoqda...</p>
    </div>
    <div class="header-right">
      <button class="danger" onclick="clearAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.29"/></svg>
        Tozalash
      </button>
      <button class="primary" onclick="saveData()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Saqlash
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Jami accountlar</div>
      <div class="stat-val" id="s-total">10</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bugun ishlatilgan</div>
      <div class="stat-val amber" id="s-used">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hali mavjud</div>
      <div class="stat-val green" id="s-free">10</div>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>✓</th>
          <th>Ism / Izoh</th>
          <th>Email</th>
          <th>Oxirgi vaqt</th>
          <th>Holat</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="divider"></div>

  <div class="footer-note">
    Ma'lumotlar brauzer xotirasiga saqlanadi — sahifani yopsangiz ham qoladi.
    Har kuni "Tozalash" tugmasini bosib yangi kun boshlang.
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-name">Izoh qo'shish</h3>
    <p id="modal-email"></p>
    <textarea id="modal-input" placeholder="Bu account haqida izoh yozing..."></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Bekor</button>
      <button class="primary" onclick="saveNote()">Saqlash</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const ACCOUNTS = [
  { id:1,  name:"Muhammadrasul Qosimov", email:"muhammad11rasul2011@gmail.com" },
  { id:2,  name:"MR developer",          email:"mrdevs2011@gmail.com" },
  { id:3,  name:"MR Qosimov",            email:"qosimovmr07@gmail.com" },
  { id:4,  name:"MR Devs",               email:"mrdevelop2011@gmail.com" },
  { id:5,  name:"Muborak Fayzullayeva",  email:"muborakfayzullayeva776@gmail.com" },
  { id:6,  name:"Fazlulloh Qosimov",     email:"fazlullohqosimovbloger@gmail.com" },
  { id:7,  name:"Mau Mau",               email:"maumau01010201@gmail.com" },
  { id:8,  name:"Muhammadsodiq Sobirov", email:"sobirovmuhammadsodiq51@gmail.com" },
  { id:9,  name:"BibiXojar",             email:"xojarlive@gmail.com" },
  { id:10, name:"MR_BIR",               email:"mrbir460@gmail.com" },
];

let state = {};
let editingId = null;

const KEY = 'claude_tracker_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  ACCOUNTS.forEach(a => {
    if (!state[a.id]) state[a.id] = { used: false, ts: null, note: '' };
  });
}

function saveData() {
  localStorage.setItem(KEY, JSON.stringify(state));
  toast('💾 Saqlandi!');
}

function toggle(id) {
  const s = state[id];
  s.used = !s.used;
  s.ts = s.used ? Date.now() : null;
  render();
  saveData();
}

function clearAll() {
  if (!confirm('Barcha checkboxlar tozalansinmi?')) return;
  ACCOUNTS.forEach(a => { state[a.id].used = false; state[a.id].ts = null; });
  render();
  saveData();
  toast('✅ Yangi kun boshlandi!');
}

function openModal(id) {
  editingId = id;
  const a = ACCOUNTS.find(x => x.id === id);
  document.getElementById('modal-name').textContent = a.name;
  document.getElementById('modal-email').textContent = a.email;
  document.getElementById('modal-input').value = state[id].note || '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveNote() {
  if (editingId) {
    state[editingId].note = document.getElementById('modal-input').value.trim();
    saveData();
    render();
    closeModal();
  }
}

function formatTime(ts) {
  if (!ts) return { text: '—', today: false };
  const d = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  if (isToday) return { text: 'Bugun ' + hh + ':' + mi, today: true };
  return { text: dd + '/' + mm + ' ' + hh + ':' + mi, today: false };
}

function render() {
  const tbody = document.getElementById('tbody');
  let usedCount = 0;

  tbody.innerHTML = ACCOUNTS.map((a, i) => {
    const s = state[a.id];
    if (s.used) usedCount++;
    const t = formatTime(s.ts);
    const delay = (i * 0.03).toFixed(2);
    return `<tr class="${s.used ? 'used' : ''}" style="animation-delay:${delay}s">
      <td>
        <label class="cb-wrap" title="Foydalanildi deb belgilash">
          <input type="checkbox" ${s.used ? 'checked' : ''} onchange="toggle(${a.id})" />
        </label>
      </td>
      <td>
        <div class="account-name">${a.name}</div>
        ${s.note ? `<div class="account-note">${s.note}</div>` : ''}
      </td>
      <td><div class="email">${a.email}</div></td>
      <td><div class="time-cell ${t.today ? 'today' : ''}">${t.text}</div></td>
      <td>
        <span class="badge ${s.used ? 'used' : 'free'}">${s.used ? 'Ishlatildi' : 'Erkin'}</span>
        <button class="icon-btn" onclick="openModal(${a.id})" title="Izoh qo'shish" style="margin-left:4px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('s-used').textContent = usedCount;
  document.getElementById('s-free').textContent = ACCOUNTS.length - usedCount;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function updateDate() {
  const d = new Date();
  const days = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
  const months = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  document.getElementById('current-date').textContent =
    days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && editingId !== null) { e.preventDefault(); saveNote(); }
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

loadState();
render();
updateDate();
</script>
</body>
</html>
